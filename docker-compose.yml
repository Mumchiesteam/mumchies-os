services:
  db:
    image: postgres:16-alpine
    container_name: mumchies-os-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mumchies_os}
      POSTGRES_USER: ${POSTGRES_USER:-mumchies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./database/postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mumchies}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-mumchies_os}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
